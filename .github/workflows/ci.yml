name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v -race ./...

    - name: Security Check
      run: |
        GOTOOLCHAIN=go1.26.0 go install golang.org/x/vuln/cmd/govulncheck@latest
        GOTOOLCHAIN=go1.26.0 govulncheck ./...
